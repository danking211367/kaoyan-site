name: 📊 每日数据自动更新 + 静态站点生成

on:
  schedule:
    # 每天北京时间 8:00 = UTC 0:00
    - cron: '0 0 * * *'
  # 支持手动触发
  workflow_dispatch:

# 设置写权限
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v4

      - name: 🔧 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 安装依赖
        run: npm ci

      - name: 🔄 更新数据
        run: node scripts/update-data.js

      - name: 🏗️ 生成静态站点（数据注入 HTML）
        run: node scripts/build-static.js

      - name: 📤 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/index.html index.html
          git diff --staged --quiet || git commit -m "📊 每日数据更新 + 静态站点重建 - $(date +'%Y-%m-%d %H:%M' --utc)"
          git push
