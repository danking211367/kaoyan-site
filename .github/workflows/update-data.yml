name: ⏱ 每日轮换（电脑关机时备用）

on:
  schedule:
    # 每天 8:00 UTC (16:00 CST) 执行，仅当本地未轮换时才跑
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-rotate:
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v4

      - name: 🔧 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 安装依赖
        run: npm ci

      - name: 🔍 检查今天是否已有轮换
        id: check
        run: |
          if [ -f data/last-update.json ]; then
            TODAY=$(date +%Y-%m-%d)
            UPDATE_DATE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/last-update.json','utf8')).updatedAt.substring(0,10))" 2>/dev/null)
            if [ "$TODAY" = "$UPDATE_DATE" ]; then
              echo "✅ 今天已有更新，跳过"
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "⏳ 今天未更新，运行轮换"
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 🔄 轮换更新（自动优先周包，无则静态轮换）
        if: steps.check.outputs.skip != 'true'
        run: node scripts/update-data.js

      - name: 🏗️ 生成静态站点
        if: steps.check.outputs.skip != 'true'
        run: node scripts/build-static.js

      - name: 📤 提交并推送
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/index.html index.html
          git diff --staged --quiet || git commit -m "📊 每日轮换 - $(date +'%Y-%m-%d %H:%M' --utc)"
          git push
