name: 🔄 备用更新（电脑关机时执行）

on:
  schedule:
    # 每天 16:00 CST (8:00 UTC)，仅当本地未更新时才跑
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup-update:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v4

      - name: 🔧 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 安装依赖
        run: npm ci

      - name: 🔍 检查今天是否已有更新
        id: check
        run: |
          if [ -f data/last-update.json ]; then
            TODAY=$(date +%Y-%m-%d)
            UPDATE_DATE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/last-update.json','utf8')).updatedAt.substring(0,10))" 2>/dev/null)
            if [ "$TODAY" = "$UPDATE_DATE" ]; then
              echo "✅ 今天已有更新，跳过"
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # 判断今日星期几（1=周一, 7=周日）
          DOW=$(date +%u)
          echo "dow=$DOW" >> $GITHUB_OUTPUT

          # 检查周包是否需要刷新（周一且周包不是本周的）
          if [ "$DOW" = "1" ] && [ -f data/weekly-pack.json ]; then
            PACK_WEEK=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/weekly-pack.json','utf8')).weekStart)" 2>/dev/null)
            THIS_MONDAY=$(date -d 'last monday' +%F 2>/dev/null || date -d 'monday-7 days' +%F 2>/dev/null || date +%F)
            if [ "$PACK_WEEK" != "$THIS_MONDAY" ]; then
              echo "📦 周一需刷新周包 (旧:$PACK_WEEK, 新:$THIS_MONDAY)"
              echo "refresh_pack=true" >> $GITHUB_OUTPUT
            else
              echo "✅ 周包已是最新"
            fi
          elif [ "$DOW" = "1" ] && [ ! -f data/weekly-pack.json ]; then
            echo "📦 周包不存在，周一需生成"
            echo "refresh_pack=true" >> $GITHUB_OUTPUT
          fi

          echo "⏳ 运行更新"
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: 📦 刷新周包（周一备用）
        if: steps.check.outputs.skip != 'true' && steps.check.outputs.refresh_pack == 'true'
        run: node scripts/generate-weekly-pack.js --static

      - name: 🔄 轮换更新（自动优先周包，无则静态轮换）
        if: steps.check.outputs.skip != 'true'
        run: node scripts/update-data.js

      - name: 🏗️ 生成静态站点
        if: steps.check.outputs.skip != 'true'
        run: node scripts/build-static.js

      - name: 📤 提交并推送
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/index.html index.html scripts/
          git diff --staged --quiet || git commit -m "📊 备用更新 - $(date +'%Y-%m-%d %H:%M' --utc)"
          git push
